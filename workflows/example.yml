workflow:
  name: Example Base Workflow
  description: This is a base workflow that demonstrates the use of control flow commands like the print, if, while, for_each, and for commands.
  parameters:
    - parameter_name_1: parameter_description_1
    - parameter_name_2: parameter_description_2
    - parameter_name_3: 
        required: true
        default: ["Marc", "John", "Jane", "Jim", "Jill"]

  steps:
    - set_variable:
        value: Marc
      as: name
    - print: "Hello, {{name}}!"
    - print:
        message: "Another way to print a message: Hello, {{name}}!"

    - if: "{{name}} == 'Marc'"
      then:
        - print: "Inside an if statement: Hello, Marc!"
      else:
        - print: "Inside an else statement: Hello, {{name}}!"

    - set_variable: 1
      as: counter
    - while: "{{counter}} <= 5"
      do:            
        - print: "Running a while loop: Hello, {{name}} counter is {{counter}}!"
        - set_variable: "{{counter}} + 1"
          as: counter
    
    - set_variable: "{{parameter_name_3}}"
      as: list_of_names
    - for_each: "{{list_of_names}}"
      as: name
      do:
        - print: "Greetings from a for_each loop: Hello, {{name}}!"

    - for:
      start: 0
      end: 5
      as: index
      do:
        - print: "Running a for loop: Current index is {{index}}"

    # --- Nested control‑flow example ---
    - set_variable: 0
      as: counter
    - while: "{{counter}} < 3"
      do:
        - print: "Outer while iteration, counter={{counter}}"
        # A list we loop over each iteration
        - set_variable: ["alpha", "beta", "gamma"]
          as: items
        - for_each: "{{items}}"
          as: item
          do:
            - if: "{{item}} == 'beta'"
              then:
                - print: "  Found special item 'beta' at counter={{counter}}"
              else:
                - print: "  Regular item '{{item}}' at counter={{counter}}"
        - set_variable: "{{counter}} + 1"
          as: counter